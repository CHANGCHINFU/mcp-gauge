name: Publish to npm (Trusted Publishing / OIDC)

# Publishes mcp-gauge-x402 to npm with no stored token — npm trusts this
# GitHub Actions workflow via OIDC. Configure the Trusted Publisher on npmjs.com:
#   package: mcp-gauge-x402 · repo: CHANGCHINFU/mcp-gauge · workflow: publish.yml
# Then create a GitHub Release (or run this workflow manually) to publish.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write        # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm (OIDC trusted publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install deps
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Publish (OIDC, provenance)
        run: npm publish --provenance --access public
